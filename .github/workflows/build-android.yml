name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        working-directory: frontend/android
        run: gradle wrapper --gradle-version 8.5

      - name: Grant execute permission for gradlew
        run: chmod +x frontend/android/gradlew

      - name: Generate Debug Keystore
        working-directory: frontend/android/app
        run: |
          keytool -genkeypair \
            -v -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: makco-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        working-directory: frontend/android
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: makco-release-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
